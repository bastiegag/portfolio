<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" viewBox="0 0 1000 280">
	<defs>
    <style>
      .sky-shape {
        fill: url(#sky-gradient);
        stroke-width: 0px;
      }
    </style>
		<linearGradient
			id="sky-gradient"
			x1="0"
			y1="280"
			x2="0"
			y2="0"
			gradientTransform="translate(0 280) scale(1 -1)"
			gradientUnits="userSpaceOnUse"
		>
			<stop offset="0" stop-color="#c5e7f3" />
			<stop offset=".5" stop-color="#48a6d9" />
			<stop offset="1" stop-color="#0162b1" />
		</linearGradient>
	</defs>
	<rect class="sky-shape" width="1000" height="280" transform="translate(1000 280) rotate(180)" />
</svg>